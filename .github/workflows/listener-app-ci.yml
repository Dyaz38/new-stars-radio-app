name: Listener App CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/listener-app-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/listener-app-ci.yml'

jobs:
  build-and-test:
    name: Build and test listener app
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Unit tests (CI subset)
        run: npm run test:ci
