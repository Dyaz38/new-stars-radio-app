<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Stars Radio - Tomorrow's Stars, Today</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#8b5cf6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#3b0764" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="New Stars Radio — Tomorrow's Stars, Today. Hip-Hop, R'n'B and Smooth Jazz live 24/7." />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/station-icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/station-icon-512.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="New Stars Radio" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#8b5cf6" />
    <meta name="msapplication-TileImage" content="/station-icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Unregister service worker in development -->
    <script>
      // Unregister service workers in development mode
      if ('serviceWorker' in navigator && window.location.hostname === 'localhost') {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(registration => {
            registration.unregister().then(() => {
              console.log('Service worker unregistered for development');
            });
          });
        });
        // Clear all caches
        if ('caches' in window) {
          caches.keys().then(names => {
            names.forEach(name => {
              caches.delete(name);
              console.log('Cache cleared:', name);
            });
          });
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
